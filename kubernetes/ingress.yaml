apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: ecommerce-ingress
  namespace: ecommerce

spec:
  rules:
  - host: ecommerce.local

    http:
      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend
            port:
              number: 3000